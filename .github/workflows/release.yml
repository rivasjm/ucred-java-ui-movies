name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run tests
      run: mvn test

  build-jar:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-artifact.outputs.version }}
      jar_name: ${{ steps.set-artifact.outputs.jar_name }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build JAR
      run: mvn package

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: jar-file
        path: target/ucred-java-ui-movies-*.jar

    - name: Set artifact vars
      id: set-artifact
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        JAR_NAME=$(ls target/*.jar | head -n1 | xargs -n1 basename)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "jar_name=$JAR_NAME" >> $GITHUB_OUTPUT
    
  # Consolidated packaging job using a matrix for Windows/macOS/Linux
  build-apps:
    needs: build-jar
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Download JAR
      uses: actions/download-artifact@v4
      with:
        name: jar-file
        path: target/

    - name: Show target contents
      run: |
        echo "Runner: $RUNNER_OS"
        ls -la target || true

    - name: Check Java and jpackage
      run: |
        java -version || true
        jpackage --version || true

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        jpackage --input target `
          --name "UCRED-Movies" `
          --main-jar ${{ needs.build-jar.outputs.jar_name }} `
          --type app-image `
          --app-version ${{ needs.build-jar.outputs.version }} `
          --vendor "UCRED" `
          --description "Movie browser using TMDb API"
        Compress-Archive -Path "UCRED-Movies" -DestinationPath "UCRED-Movies-Windows-x64.zip"

    - name: Package (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        jpackage --input target \
          --name "UCRED-Movies" \
          --main-jar ${{ needs.build-jar.outputs.jar_name }} \
          --type app-image \
          --app-version ${{ needs.build-jar.outputs.version }} \
          --vendor "UCRED" \
          --description "Movie browser using TMDb API"
        zip -r UCRED-Movies-macOS.zip "UCRED-Movies.app"

    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        jpackage --input target \
          --name UCRED-Movies \
          --main-jar ${{ needs.build-jar.outputs.jar_name }} \
          --type app-image \
          --app-version ${{ needs.build-jar.outputs.version }} \
          --vendor "UCRED" \
          --description "Movie browser using TMDb API"
        zip -r UCRED-Movies-Linux-x64.zip UCRED-Movies

    - name: Upload portable (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-portable
        path: "*.zip"

    - name: Upload portable (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: macos-portable
        path: "*.zip"

    - name: Upload portable (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: linux-portable
        path: "*.zip"

  

  create-release:
    needs: [build-apps]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          jar-file/*.jar
          windows-portable/*.zip
          macos-portable/*.zip
          linux-portable/*.zip
        body: |
          # UCRED Movies Browser ${{ github.ref_name }}
          
          Navegador de películas usando la API de The Movie Database (TMDb).
          
          ## 📦 Ejecutables portables (sin instalación)
          
          ✨ **No requieren configuración previa** - La aplicación pedirá tu API key al iniciar
          
          - **Windows**: Descarga `UCRED-Movies-Windows-x64.zip`, descomprime y **doble click** en `UCRED-Movies.exe`
          - **macOS**: Descarga `UCRED-Movies-macOS.zip`, descomprime y **doble click** en `UCRED-Movies.app`
          - **Linux**: Descarga `UCRED-Movies-Linux-x64.zip`, descomprime y ejecuta `./UCRED-Movies/bin/UCRED-Movies`
          
          🔧 **JRE incluido** - No necesitas tener Java instalado
          
          ## 🔑 API Key de TMDb
          
          Al ejecutar la aplicación, se mostrará un diálogo solicitando tu API key de TMDb.
          
          **Obtén tu API key gratis (1 minuto):**
          1. Crea cuenta en https://www.themoviedb.org/signup
          2. Ve a https://www.themoviedb.org/settings/api
          3. Solicita API key (opción "Developer")
          4. Copia tu **API Key (v3 auth)**
          
          ⚠️ **Nota**: La API key NO se guarda, deberás introducirla cada vez que abras la aplicación.
          
          ## JAR ejecutable (requiere Java 17+)

          Si prefieres usar el JAR directamente (requiere Java 17+):
          ```bash
          java -jar jar-file/*.jar
          ```
          
          La aplicación pedirá la API key al iniciar.
        draft: false
        prerelease: false
